<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#059669">
  <meta name="description" content="Huda — Your Islamic Companion. Quran, Prayer Times, Dhikr, Duas, and more.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Huda">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Huda — Islamic Companion</title>

  <!-- Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://huda-six.vercel.app">
  <meta property="og:title" content="Huda — Islamic Companion">
  <meta property="og:description" content="Quran with audio, Prayer Times, Dhikr, Duas and more. Free Islamic companion — works offline.">
  <meta property="og:image" content="https://huda-six.vercel.app/icons/social.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Huda — Islamic Companion">
  <meta name="twitter:description" content="Quran with audio, Prayer Times, Dhikr, Duas and more. Free Islamic companion — works offline.">
  <meta name="twitter:image" content="https://huda-six.vercel.app/icons/social.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css?v=231">

  <!-- adhan.js for prayer time calculation (local, no defer so it's ready immediately) -->
  <script src="/js/adhan.min.js?v=130"></script>

  <!-- Google Fonts: Arabic text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&family=Amiri+Quran&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="app">

  <!-- TAB: HOME -->
  <section id="tab-home" class="tab-content active">
    <!-- rendered by JS -->
  </section>

  <!-- TAB: QURAN -->
  <section id="tab-quran" class="tab-content">
    <!-- rendered by JS on first switch -->
  </section>

  <!-- TAB: PRAYER TIMES -->
  <section id="tab-prayer" class="tab-content">
    <!-- rendered by JS on first switch -->
  </section>

  <!-- TAB: DHIKR -->
  <section id="tab-dhikr" class="tab-content">
    <!-- rendered by JS on first switch -->
  </section>

  <!-- TAB: DUAS -->
  <section id="tab-duas" class="tab-content">
    <!-- rendered by JS on first switch -->
  </section>

  <!-- TAB: LEARN -->
  <section id="tab-learn" class="tab-content">
    <!-- rendered by JS on first switch -->
  </section>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-item active" data-tab="home">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" data-tab="quran">
      <div class="nav-icon">📖</div>
      <span class="nav-label">Quran</span>
    </button>
    <button class="nav-item" data-tab="prayer">
      <div class="nav-icon">🕌</div>
      <span class="nav-label">Prayer</span>
    </button>
    <button class="nav-item" data-tab="dhikr">
      <div class="nav-icon">📿</div>
      <span class="nav-label">Dhikr</span>
    </button>
    <button class="nav-item" data-tab="duas">
      <div class="nav-icon">🤲</div>
      <span class="nav-label">Duas</span>
    </button>
    <button class="nav-item" data-tab="learn">
      <div class="nav-icon">📚</div>
      <span class="nav-label">Learn</span>
    </button>
  </nav>

  <!-- PWA Install Banner -->
  <div id="install-banner">
    <div class="install-text">
      <strong>Install Huda</strong> on your home screen for offline access
    </div>
    <button class="install-btn" onclick="installApp()">Install</button>
    <button class="install-dismiss" onclick="dismissInstall()">✕</button>
  </div>

  <!-- Account Modal -->
  <div id="auth-modal" class="auth-modal-overlay" style="display:none" onclick="closeAuthModal(event)">
    <div class="auth-modal-box" onclick="event.stopPropagation()">
      <button class="auth-modal-close" onclick="closeAuthModal()">✕</button>
      <div id="auth-modal-body"></div>
    </div>
  </div>

</div>

<!-- Vercel Analytics -->
<script defer src="/_vercel/insights/script.js"></script>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Auth & Sync -->
<script src="/js/auth.js?v=130"></script>
<script src="/js/sync.js?v=169"></script>
<!-- Data & App -->
<script src="/js/data.js?v=133"></script>
<script src="/js/app.js?v=222"></script>
<script src="/js/home.js?v=216"></script>
<script src="/js/quran.js?v=228"></script>
<script src="/js/prayer.js?v=205"></script>
<script src="/js/dhikr.js?v=161"></script>
<script src="/js/duas.js?v=171"></script>
<script src="/js/learn.js?v=211"></script>
<script src="/js/plan.js?v=219"></script>

</body>
</html>
