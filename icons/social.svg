<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern overlay -->
  <rect width="1200" height="630" fill="rgba(255,255,255,0.03)"/>

  <!-- Mosque icon -->
  <text x="600" y="270" font-size="160" text-anchor="middle" dominant-baseline="middle">🕌</text>

  <!-- App name -->
  <text x="600" y="390" font-family="Georgia, serif" font-size="96" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">Huda</text>

  <!-- Tagline -->
  <text x="600" y="470" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.82)" text-anchor="middle">Your Islamic Companion</text>

  <!-- Features row -->
  <text x="600" y="545" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.55)" text-anchor="middle">Quran · Prayer Times · Dhikr · Duas</text>
</svg>
